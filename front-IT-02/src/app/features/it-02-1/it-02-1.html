<div class="w-full flex justify-center bg-green-500 p-8 border-t-8">
  <div class="text-center">
    <h1 class="text-3xl font-bold text-gray-800">IT-02-1</h1>
  </div>
</div>
<button type="button" (click)="testConnection()" class="bg-green-500 text-white px-4 py-2 rounded">
  Test API
</button>
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white shadow-lg rounded-xl p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">เข้าสู่ระบบ</h1>
      <p class="text-gray-500 mt-2">กรุณากรอกข้อมูลเพื่อเข้าใช้งานระบบ</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2"> Username </label>

        <input
          type="text"
          formControlName="username"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="กรอก Username"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2"> Password </label>

        <input
          type="password"
          formControlName="password"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="กรอกรหัสผ่าน"
        />
      </div>

      <!-- Error -->
      <div
        *ngIf="errorMessage"
        class="bg-red-100 border border-red-300 text-red-600 rounded-lg p-3"
      >
        {{ errorMessage }}
      </div>

      <!-- Login Button -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || loading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium transition cursor-pointer"
      >
        {{ loading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ' }}
      </button>
    </form>

    <!-- Register -->
    <div class="mt-6 text-center">
      <p class="text-gray-600 text-sm">ยังไม่มีบัญชี?</p>

      <button
        type="button"
        (click)="goToRegister()"
        class="mt-2 text-blue-600 hover:text-blue-700 font-medium cursor-pointer"
      >
        สมัครสมาชิก
      </button>
    </div>
  </div>
</div>
