version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: it02-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydatabase

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./back-IT-02

    container_name: it02-backend

    ports:
      - "8080:8080"

    environment:
      JWT_SECRET: 1234

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: mydatabase

    depends_on:
      - postgres

  frontend:
    build:
      context: ./front-IT-02

    container_name: it02-frontend

    ports:
      - "4200:4200"

    depends_on:
      - backend

volumes:
  postgres_data: