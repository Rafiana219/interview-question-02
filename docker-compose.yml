services:

  postgres:
    image: postgres:17
    container_name: it02-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: mydatabase

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./back-IT-02

    container_name: it02-backend

    ports:
      - "8080:8080"

    environment:
      JWT_SECRET: 1234

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: mydatabase

    depends_on:
      postgres:
        condition: service_healthy # <--- สำคัญมาก! บังคับให้รอจนกว่า DB จะพร้อมใช้งานจริงๆ

  frontend:
    build:
      context: ./front-IT-02

    container_name: it02-frontend

    ports:
      - "4200:4200"

    depends_on:
      - backend

volumes:
  postgres_data:
